<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Worship CLC & HolyChords</title>
    <script src="https://cloudflare.com"></script>
    <style>
        :root { 
            --bg: #0b0e14; 
            --card: #141923; 
            --text: #f0f2f5; 
            --primary: #386bf6; 
            --accent: #10b981; 
            --danger: #ef4444; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        
        /* Окно, которое загружает оригинальный сайт HolyChords */
        #browser-frame {
            width: 100%;
            height: calc(100% - 70px); /* Оставляем место внизу для нашей панели */
            border: none;
            background: #0b0e14;
        }
        
        .container { position: absolute; top: 0; left: 0; right: 0; height: calc(100% - 70px); padding: 15px; overflow-y: auto; display: none; background: var(--bg); }
        .container.active { display: block; }
        
        /* Нижняя панель управления */
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 70px; background: var(--card); display: flex; border-top: 1px solid #1e2638; z-index: 100; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #4a5568; font-size: 0.8rem; text-decoration: none; cursor: pointer; }
        .nav-item.active { color: var(--primary); font-weight: 600; }
        .nav-icon { font-size: 1.4rem; margin-bottom: 2px; }

        /* Элементы списков */
        .song-card { background: var(--card); border-radius: 8px; padding: 16px; margin-bottom: 12px; border: 1px solid #1e2638; }
        .song-title { font-size: 1.15rem; font-weight: 700; color: var(--text); margin-bottom: 5px; }
        .controls { display: flex; gap: 8px; margin: 10px 0 0 0; flex-wrap: wrap; }
        button { background: var(--primary); color: white; border: none; padding: 10px 14px; border-radius: 6px; font-weight: 600; font-size: 0.85rem; cursor: pointer; flex: 1; }
        button.accent { background: var(--accent); }
        button.secondary { background: #242f41; color: #cbd5e1; border: 1px solid #334155; }
        button.danger { background: var(--danger); }
        
        .audio-box { background: #0b0e14; padding: 10px; border-radius: 6px; margin-top: 8px; border: 1px solid #1e2638; }
        audio { width: 100%; margin-top: 5px; }

        /* Всплывающее окно добавления трека */
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card); border: 1px solid #1e2638; padding: 20px; border-radius: 12px; z-index: 200; width: 90%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .modal input { width: 100%; background: var(--bg); border: 1px solid #1e2638; border-radius: 6px; padding: 12px; color: white; margin-top: 8px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <!-- ВКЛАДКА 1: ОРИГИНАЛЬНЫЙ HOLYCHORDS -->
    <iframe id="browser-frame" src="https://holychords.pro"></iframe>

    <!-- ВКЛАДКА 2: ВАШ ВОСКРЕСНЫЙ СЕТ-ЛИСТ -->
    <div id="tab-worship" class="container">
        <h2 style="margin-top: 10px; font-weight: 700;">Воскресный сет-лист</h2>
        <div class="controls" style="margin-bottom: 20px;">
            <button class="accent" onclick="shareWorshipList()">📤 Поделиться списком с командой</button>
            <button class="secondary" onclick="addCurrentPageToSet()">➕ Добавить текущую песню с экрана</button>
        </div>
        <div id="worship-list"></div>
    </div>

    <!-- ВСПЛЫВАЮЩЕЕ ОКНО ДЛЯ ПРИКРЕПЛЕНИЯ МИНУСА -->
    <div id="audio-modal" class="modal">
        <h3 style="margin-top:0;">Прикрепить аудио (MP3)</h3>
        <label>Вставьте прямую ссылку на MP3 файл:</label>
        <input type="text" id="modal-audio-url" placeholder="https://clc.ru">
        <div class="controls">
            <button class="accent" onclick="saveAudioUrl()">Сохранить</button>
            <button class="secondary" onclick="closeAudioModal()">Отмена</button>
        </div>
    </div>

    <!-- НИЖНЕЕ МЕНЮ НАВИГАЦИИ -->
    <nav class="nav-bar">
        <div class="nav-item active" id="nav-browser" onclick="switchTab('browser')">
            <div class="nav-icon">🔍</div><div>HolyChords</div>
        </div>
        <div class="nav-item" id="nav-worship" onclick="switchTab('worship')">
            <div class="nav-icon">📅</div><div>Воскресение</div>
        </div>
    </nav>

    <script>
        // База вашего личного сет-листа
        let worshipSet = JSON.parse(localStorage.getItem('h_worship_set')) || [
            { id: 1, title: "Исход ( VL worship )", url: "https://holychords.pro", audioUrl: "https://soundhelix.com" }
        ];
        
        let activeSongIdForAudio = null;
        let tonePlayer = null; let pitchShiftNode = null; let currentAudioShift = 0;

        function saveStorage() { localStorage.setItem('h_worship_set', JSON.stringify(worshipSet)); }

        function addCurrentPageToSet() {
            // Механизм автоматического подхвата названия трека
            const frame = document.getElementById('browser-frame');
            let currentUrl = frame.contentWindow ? frame.contentWindow.location.href : frame.src;
            
            let title = prompt("Введите название песни для сет-листа:", "Новая песня с HolyChords");
            if(!title) return;

            worshipSet.push({
                id: Date.now(),
                title: title,
                url: currentUrl,
                audioUrl: ""
            });
            saveStorage();
            renderWorshipList();
            alert("Песня успешно добавлена в воскресный список!");
        }

        function renderWorshipList() {
            const list = document.getElementById('worship-list');
            list.innerHTML = '';
            
            if(worshipSet.length === 0) {
                list.innerHTML = '<p style="text-align:center; color:#718096; margin-top:40px;">Сет-лист пуст. Добавьте песни.</p>';
                return;
            }

            worshipSet.forEach(song => {
                const card = document.createElement('div');
                card.className = 'song-card';
                
                let audioHtml = '';
                if(song.audioUrl) {
                    audioHtml = `
                        <div class="audio-box">
                            <label style="font-size:0.8rem; color:#718096;">Плеер с перемоткой:</label>
                            <audio src="${song.audioUrl}" controls></audio>
                            <div class="controls" style="margin-top:8px;">
                                <button class="secondary" style="padding:6px;" onclick="changeAudioPitch(${song.id}, -1)">♭ Тон -1</button>
                                <button class="secondary" style="padding:6px;" onclick="changeAudioPitch(${song.id}, 1)">♯ Тон +1</button>
                            </div>
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="song-title">${song.title}</div>
                    <div style="font-size:0.8rem; color:#4a5568; margin-bottom:10px; word-break:break-all;">Ссылка: ${song.url}</div>
                    <div class="controls">
                        <button onclick="openInBrowser('${song.url}')">📖 Открыть текст</button>
                        <button class="secondary" onclick="openAudioModal(${song.id})">🎵 Музыка</button>
                        <button class="danger" style="max-width:45px;" onclick="deleteSong(${song.id})">❌</button>
                    </div>
                    ${audioHtml}
                `;
                list.appendChild(card);
            });
        }

        function openInBrowser(url) {
            document.getElementById('browser-frame').src = url;
            switchTab('browser');
        }

        function openAudioModal(id) {
            activeSongIdForAudio = id;
            const song = worshipSet.find(s => s.id === id);
            document.getElementById('modal-audio-url').value = song.audioUrl || "";
            document.getElementById('audio-modal').style.display = "block";
        }

        function closeAudioModal() { document.getElementById('audio-modal').style.display = "none"; }

        function saveAudioUrl() {
            const url = document.getElementById('modal-audio-url').value.trim();
            const song = worshipSet.find(s => s.id === activeSongIdForAudio);
            if(song) {
                song.audioUrl = url;
                saveStorage();
                renderWorshipList();
            }
            closeAudioModal();
        }

        function deleteSong(id) {
            worshipSet = worshipSet.filter(s => s.id !== id);
            saveStorage();
            renderWorshipList();
        }

        async function changeAudioPitch(id, amount) {
            const song = worshipSet.find(s => s.id === id);
            if(!song || !song.audioUrl) return;
            
            // Выключаем все стандартные плееры
            document.querySelectorAll('audio').forEach(a => a.pause());
            
            currentAudioShift += amount;
            if(!tonePlayer) {
                await Tone.start();
                pitchShiftNode = new Tone.PitchShift(0).toDestination();
                tonePlayer = new Tone.Player(song.audioUrl).connect(pitchShiftNode);
            }
            if(tonePlayer) {
                pitchShiftNode.pitch = currentAudioShift;
                if(tonePlayer.state !== "started") tonePlayer.start();
            }
            alert(`Тональность аудио изменена: ${currentAudioShift > 0 ? '+' : ''}${currentAudioShift}`);
        }

        function shareWorshipList() {
            if(worshipSet.length === 0) return alert('Список пуст!');
            let text = "📋 НАШ ВОСКРЕСНЫЙ СЕТ-ЛИСТ (HolyChords):\n\n";
            worshipSet.forEach((s, index) => {
                text += `${index + 1}. ${s.title}\n🔗 Ссылка: ${s.url}\n\n`;
            });
            if (navigator.share) { navigator.share({ title: 'Worship Set', text: text }); } 
            else { navigator.clipboard.writeText(text); alert('Список скопирован в буфер!'); }
        }

        function switchTab(tabName) {
            document.getElementById('browser-frame').style.display = tabName === 'browser' ? 'block' : 'none';
            document.getElementById('tab-worship').classList.toggle('active', tabName === 'worship');
            
            document.getElementById('nav-browser').classList.toggle('active', tabName === 'browser');
            document.getElementById('nav-worship').classList.toggle('active', tabName === 'worship');
            
            if(tabName === 'worship') renderWorshipList();
        }

        renderWorshipList();
    </script>
</body>
</html>
