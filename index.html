<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Worship CLC</title>
    <script src="https://cloudflare.com"></script>
    <style>
        :root { 
            --bg: #0b0e14; 
            --card: #141923; 
            --text: #f0f2f5; 
            --primary: #386bf6; 
            --accent: #10b981; 
            --danger: #ef4444; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 0; padding-bottom: 95px; }
        header { background: var(--card); padding: 18px 20px; text-align: center; font-weight: 700; font-size: 1.25rem; border-bottom: 1px solid #1e2638; display: flex; justify-content: space-between; align-items: center; }
        .container { padding: 15px; max-width: 650px; margin: 0 auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .song-card { background: var(--card); border-radius: 8px; padding: 16px; margin-bottom: 12px; border: 1px solid #1e2638; }
        .song-title { font-size: 1.15rem; font-weight: 700; margin-bottom: 4px; color: var(--text); }
        .song-url-info { font-size: 0.8rem; color: #718096; word-break: break-all; margin-bottom: 10px; }
        
        .controls { display: flex; gap: 8px; margin: 10px 0; flex-wrap: wrap; }
        button { background: var(--primary); color: white; border: none; padding: 12px 16px; border-radius: 6px; font-weight: 600; font-size: 0.9rem; cursor: pointer; flex: 1; min-width: 80px; }
        button.accent { background: var(--accent); }
        button.secondary { background: #242f41; color: #cbd5e1; border: 1px solid #334155; }
        button.danger { background: var(--danger); }
        
        .audio-box { background: #0b0e14; padding: 14px; border-radius: 6px; margin-top: 10px; border: 1px solid #1e2638; }
        audio { width: 100%; margin-top: 6px; }
        .audio-status { font-size: 0.8rem; color: #718096; margin-top: 4px; }
        
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 68px; background: var(--card); display: flex; border-top: 1px solid #1e2638; z-index: 10; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #4a5568; font-size: 0.8rem; text-decoration: none; cursor: pointer; }
        .nav-item.active { color: var(--primary); font-weight: 600; }
        .nav-icon { font-size: 1.35rem; margin-bottom: 3px; }
        
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 0.9rem; color: #a0aec0; font-weight: 500; }
        input[type="text"] { width: 100%; background: var(--card); border: 1px solid #1e2638; border-radius: 6px; padding: 12px; color: white; font-size: 1rem; }
    </style>
</head>
<body>

    <header>
        <span id="page-title">Worship Сет-листы</span>
        <button id="btn-admin-toggle" class="secondary" style="max-width: fit-content; padding: 6px 12px; font-size: 0.8rem;" onclick="toggleAdminMode()">Редактор: Выкл</button>
    </header>

    <div class="container">
        <!-- ВКЛАДКА 1: ОБЩАЯ БАЗА ССЫЛОК -->
        <div id="tab-songs" class="tab-content active">
            <div class="controls" id="admin-add-btn-box" style="display: none;">
                <button class="accent" onclick="openAddForm()">+ Добавить песню HolyChords</button>
            </div>
            <div id="songs-list"></div>
        </div>

        <!-- ВКЛАДКА 2: ВОСКРЕСНЫЙ СЕТ-ЛИСТ -->
        <div id="tab-worship" class="tab-content">
            <div class="controls">
                <button class="accent" onclick="shareWorshipList()">📤 Поделиться сет-листом</button>
            </div>
            <div id="worship-list"></div>
        </div>

        <!-- ВКЛАДКА 3: ФОРМА ДОБАВЛЕНИЯ ПЕСНИ ПО ССЫЛКЕ -->
        <div id="tab-add-song" class="tab-content">
            <button class="secondary" onclick="switchTab('songs')">← Отмена</button>
            <h3 id="form-header" style="margin-top: 15px; font-weight: 700;">Добавить песню</h3>
            <input type="hidden" id="form-id">
            
            <div class="form-group">
                <label>Название песни и группа</label>
                <input type="text" id="form-title" placeholder="Например: Исход (VL worship)">
            </div>
            <div class="form-group">
                <label>Ссылка на песню на HolyChords.pro</label>
                <input type="text" id="form-url" placeholder="https://holychords.pro">
            </div>
            <div class="form-group">
                <label>Ссылка на аудиофайл MP3 (Необязательно)</label>
                <input type="text" id="form-audio-url" placeholder="https://example.com">
            </div>
            <button class="accent" style="width: 100%; margin-top: 10px; padding: 14px;" onclick="saveSongForm()">Сохранить в базу</button>
        </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" id="nav-songs" onclick="switchTab('songs')">
            <div class="nav-icon">🎵</div><div>База ссылок</div>
        </div>
        <div class="nav-item" id="nav-worship" onclick="switchTab('worship')">
            <div class="nav-icon">📅</div><div>Воскресение</div>
        </div>
    </nav>

    <script>
        let songsDatabase = JSON.parse(localStorage.getItem('w_links_db')) || [
            { id: 1, title: "Исход (VL worship)", url: "https://holychords.pro", audioUrl: "https://soundhelix.com" }
        ];
        let worshipSetIds = JSON.parse(localStorage.getItem('w_links_set')) || [];
        let adminMode = localStorage.getItem('w_links_admin') === 'true';
        
        let tonePlayer = null; let pitchShiftNode = null; let currentAudioShift = 0;
        const scale = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "H"];

        function saveStorage() {
            localStorage.setItem('w_links_db', JSON.stringify(songsDatabase));
            localStorage.setItem('w_links_set', JSON.stringify(worshipSetIds));
        }

        function toggleAdminMode() { adminMode = !adminMode; localStorage.setItem('w_links_admin', adminMode); updateAdminUI(); }

        function updateAdminUI() {
            const btn = document.getElementById('btn-admin-toggle'); const addBox = document.getElementById('admin-add-btn-box');
            if(adminMode) {
                btn.innerText = "Редактор: Вкл"; btn.style.background = "var(--accent)"; addBox.style.display = "block";
            } else {
                btn.innerText = "Редактор: Выкл"; btn.style.background = "#242f41"; addBox.style.display = "none";
            }
            renderSongsList();
        }

        function openAddForm() {
            document.getElementById('form-header').innerText = "Добавить песню"; document.getElementById('form-id').value = "";
            document.getElementById('form-title').value = ""; document.getElementById('form-url').value = ""; document.getElementById('form-audio-url').value = "";
            switchTab('add-song');
        }

        function openEditForm(id) {
            const song = songsDatabase.find(s => s.id === id); if(!song) return;
            document.getElementById('form-header').innerText = "Редактировать запись"; document.getElementById('form-id').value = song.id;
            document.getElementById('form-title').value = song.title; document.getElementById('form-url').value = song.url; document.getElementById('form-audio-url').value = song.audioUrl || "";
            switchTab('add-song');
        }

        function saveSongForm() {
            const idVal = document.getElementById('form-id').value; const title = document.getElementById('form-title').value.trim(); const url = document.getElementById('form-url').value.trim(); const audioUrl = document.getElementById('form-audio-url').value.trim();
            if(!title || !url) { alert('Заполните название и ссылку HolyChords!'); return; }

            const id = idVal ? parseInt(idVal) : Date.now(); const index = songsDatabase.findIndex(s => s.id === id);
            const songData = { id: id, title: title, url: url, audioUrl: audioUrl };

            if(index !== -1) { songsDatabase[index] = songData; } else { songsDatabase.push(songData); }
            saveStorage(); renderSongsList(); switchTab('songs');
        }

        function deleteSong(id) {
            if(!confirm("Удалить песню из базы?")) return;
            songsDatabase = songsDatabase.filter(s => s.id !== id); worshipSetIds = worshipSetIds.filter(sid => sid !== id);
            saveStorage(); renderSongsList();
        }

        function renderSongsList() {
            const list = document.getElementById('songs-list'); list.innerHTML = '';
            songsDatabase.forEach(song => {
                const card = document.createElement('div'); card.className = 'song-card';
                let adminButtons = '';
                if(adminMode) {
                    adminButtons = `
                        <button class="secondary" style="padding:6px; font-size:0.8rem;" onclick="openEditForm(${song.id})">✏️ Изменить</button>
                        <button class="danger" style="padding:6px; font-size:0.8rem; max-width:40px;" onclick="deleteSong(${song.id})">❌</button>
                    `;
                }
                
                let audioHtml = song.audioUrl ? createAudioBlock(song) : '';
                let inSet = worshipSetIds.includes(song.id);

                card.innerHTML = `
                    <div class="song-title">${song.title}</div>
                    <div class="song-url-info">Текст: ${song.url}</div>
                    <div class="controls">
                        <button class="accent" onclick="window.open('${song.url}', '_blank')">📖 Открыть текст</button>
                        <button class="secondary" onclick="toggleWorshipStatus(${song.id})">${inSet ? '✓ В сете' : 'Добавить в сет'}</button>
                        ${adminButtons}
                    </div>
                    ${audioHtml}
                `;
                list.appendChild(card);
            });
        }

        function renderWorshipList() {
            const list = document.getElementById('worship-list'); list.innerHTML = '';
            const setSongs = songsDatabase.filter(s => worshipSetIds.includes(s.id));
            if(setSongs.length === 0) { list.innerHTML = '<p style="text-align:center; color:#718096; margin-top:40px;">Сет-лист пуст.</p>'; return; }
            
            setSongs.forEach(song => {
                const card = document.createElement('div'); card.className = 'song-card';
                let audioHtml = song.audioUrl ? createAudioBlock(song) : '';
                card.innerHTML = `
                    <div class="song-title">${song.title}</div>
                    <div class="controls">
                        <button class="accent" onclick="window.open('${song.url}', '_blank')">📖 Открыть текст</button>
                        <button class="danger" style="max-width:45px;" onclick="toggleWorshipStatus(${song.id}, true)">❌</button>
                    </div>
                    ${audioHtml}
                `;
                list.appendChild(card);
            });
        }

        function createAudioBlock(song) {
            return `
                <div class="audio-box">
                    <audio src="${song.audioUrl}" controls onplay="stopToneAudio()"></audio>
                    <div class="controls" style="margin-top:8px;">
                        <button class="secondary" style="padding:6px; font-size:0.8rem;" onclick="changeAudioPitch('${song.audioUrl}', -1)">♭ Тон -1</button>
                        <button class="secondary" style="padding:6px; font-size:0.8rem;" onclick="changeAudioPitch('${song.audioUrl}', 1)">♯ Тон +1</button>
                    </div>
                </div>
            `;
        }

        function stopToneAudio() { if (tonePlayer) { tonePlayer.stop(); tonePlayer.dispose(); tonePlayer = null; } }

        async function changeAudioPitch(url, amount) {
            document.querySelectorAll('audio').forEach(a => a.pause());
            currentAudioShift += amount;
            if(!tonePlayer) {
                await Tone.start(); pitchShiftNode = new Tone.PitchShift(0).toDestination();
                tonePlayer = new Tone.Player(url).connect(pitchShiftNode);
            }
            if(tonePlayer) {
                pitchShiftNode.pitch = currentAudioShift;
                if(tonePlayer.state !== "started") tonePlayer.start();
            }
            alert(`Тональность аудио изменена: ${currentAudioShift > 0 ? '+' : ''}${currentAudioShift}`);
        }

        function toggleWorshipStatus(id, refreshWorshipTab = false) {
            if(worshipSetIds.includes(id)) { worshipSetIds = worshipSetIds.filter(sid => sid !== id); } 
            else { worshipSetIds.push(id); }
            saveStorage();
            if(refreshWorshipTab) renderWorshipList(); else renderSongsList();
        }

        function shareWorshipList() {
            const setSongs = songsDatabase.filter(s => worshipSetIds.includes(s.id));
            if(setSongs.length === 0) return alert('Список пуст!');
            let text = "📋 НАШ ВОСКРЕСНЫЙ СЕТ-ЛИСТ:\n\n";
            setSongs.forEach((s, index) => { text += `${index + 1}. ${s.title}\n🔗 Текст и аккорды: ${s.url}\n\n`; });
            if (navigator.share) { navigator.share({ title: 'Worship Set', text: text }); } 
            else { navigator.clipboard.writeText(text); alert('Список скопирован!'); }
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            
            if(tabName === 'songs') {
                document.getElementById('tab-songs').classList.add('active'); document.getElementById('nav-songs').classList.add('active');
                document.getElementById('page-title').innerText = "Worship База ссылок"; renderSongsList();
            } else if(tabName === 'worship') {
                document.getElementById('tab-worship').classList.add('active'); document.getElementById('nav-worship').classList.add('active');
                document.getElementById('page-title').innerText = "Воскресный сет"; renderWorshipList();
            } else if(tabName === 'add-song') {
                document.getElementById('tab-add-song').classList.add('active');
            }
        }

        renderSongsList();
    </script>
</body>
</html>
