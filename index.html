<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Worship CLC</title>
    <script src="https://cloudflare.com"></script>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --text: #ffffff; --primary: #007aff; --accent: #34c759; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 0; padding-bottom: 80px; }
        header { background: var(--card); padding: 20px; text-align: center; font-weight: bold; font-size: 1.2rem; border-bottom: 1px solid #2c2c2c; }
        .container { padding: 15px; max-width: 600px; margin: 0 auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .song-card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .song-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 5px; color: var(--primary); }
        .song-author { font-size: 0.9rem; color: #aaa; margin-bottom: 10px; }
        .lyrics { white-space: pre-wrap; font-family: monospace; font-size: 1.1rem; line-height: 1.6; background: #000; padding: 15px; border-radius: 8px; overflow-x: auto; margin-top: 15px; }
        .chord { color: #ff9f0a; font-weight: bold; display: inline-block; }
        .controls { display: flex; gap: 10px; margin: 15px 0; flex-wrap: wrap; }
        button { background: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; font-size: 0.9rem; cursor: pointer; flex: 1; min-width: 80px; }
        button.accent { background: var(--accent); }
        button.secondary { background: #3a3a3c; }
        .audio-box { background: #2c2c2e; padding: 10px; border-radius: 8px; margin-top: 10px; }
        .audio-status { font-size: 0.8rem; color: #aaa; margin-top: 5px; text-align: center; }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 65px; background: var(--card); display: flex; border-top: 1px solid #2c2c2c; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #8e8e93; font-size: 0.8rem; text-decoration: none; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 1.4rem; margin-bottom: 2px; }
    </style>
</head>
<body>

    <header id="page-title">База песен</header>

    <div class="container">
        <div id="tab-songs" class="tab-content active">
            <div id="songs-list"></div>
        </div>

        <div id="tab-worship" class="tab-content">
            <div class="controls">
                <button class="accent" onclick="shareWorshipList()">Поделиться списком</button>
            </div>
            <div id="worship-list"></div>
        </div>

        <div id="tab-single-song" class="tab-content">
            <button class="secondary" onclick="switchTab('songs')">← К списку</button>
            <h2 id="current-song-title" style="margin-bottom:2px;"></h2>
            <div id="current-song-author" style="color:#aaa; margin-bottom:15px;"></div>
            
            <div class="audio-box">
                <label style="font-size:0.9rem; color:#aaa;">Демо-трек (Транспонируемый):</label>
                <div class="controls" style="margin: 5px 0;">
                    <button id="btn-play" onclick="toggleAudio()">Play</button>
                    <button class="secondary" onclick="changeAudioPitch(-1)">Аудио -1</button>
                    <button class="secondary" onclick="changeAudioPitch(1)">Аудио +1</button>
                </div>
                <div class="audio-status" id="audio-pitch-status">Тональность аудио: Оригинал</div>
            </div>

            <div class="controls">
                <button onclick="changeChordsPitch(-1)">Аккорды -1</button>
                <button onclick="changeChordsPitch(1)">Аккорды +1</button>
                <button class="secondary" id="btn-set-status" onclick="toggleWorshipStatus()">В сет-лист</button>
            </div>
            
            <div class="lyrics" id="song-lyrics-box"></div>
        </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" id="nav-songs" onclick="switchTab('songs')">
            <div class="nav-icon">🎵</div><div>Песни</div>
        </div>
        <div class="nav-item" id="nav-worship" onclick="switchTab('worship')">
            <div class="nav-icon">📅</div><div>Воскресение</div>
        </div>
    </nav>

    <script>
        let songsDatabase = [
            {
                id: 1,
                title: "Благословенно Имя Твое",
                author: "Worship CLC Band",
                audioUrl: "https://soundhelix.com",
                lyrics: "[G] Благосло[D]венно Имя Тво[Em]е [C]\nКогда зем[G]ля изоби[D]лует благами [C]\n[G] Благосло[D]венно Имя Тво[Em]е [C]"
            },
            {
                id: 2,
                title: "Велик наш Бог",
                author: "Крис Томлин",
                audioUrl: "https://soundhelix.com",
                lyrics: "[G] Велик наш Бог, [Em] пой со мной\nВелик наш Бог, [C] увидят все\nКакой ве[D]ликий наш [G] Бог!"
            }
        ];

        let worshipSetIds = [];
        let currentSong = null;
        let currentChordShift = 0;
        let currentAudioShift = 0;
        let player = null;
        let pitchShiftNode = null;
        let isPlaying = false;
        const scale = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

        function renderSongsList() {
            const list = document.getElementById('songs-list');
            list.innerHTML = '';
            songsDatabase.forEach(song => {
                const card = document.createElement('div');
                card.className = 'song-card';
                card.onclick = () => openSong(song.id);
                card.innerHTML = `<div class="song-title">${song.title}</div><div class="song-author">${song.author}</div>`;
                list.appendChild(card);
            });
        }

        function renderWorshipList() {
            const list = document.getElementById('worship-list');
            list.innerHTML = '';
            const setSongs = songsDatabase.filter(s => worshipSetIds.includes(s.id));
            if(setSongs.length === 0) {
                list.innerHTML = '<p style="text-align:center; color:#aaa; margin-top:20px;">Список пуст. Добавьте песни из каталога.</p>';
                return;
            }
            setSongs.forEach(song => {
                const card = document.createElement('div');
                card.className = 'song-card';
                card.onclick = () => openSong(song.id);
                card.innerHTML = `<div class="song-title">${song.title}</div><div class="song-author">${song.author}</div>`;
                list.appendChild(card);
            });
        }

        function openSong(id) {
            stopAudio();
            currentSong = songsDatabase.find(s => s.id === id);
            currentChordShift = 0;
            currentAudioShift = 0;
            switchTab('single-song');
            document.getElementById('current-song-title').innerText = currentSong.title;
            document.getElementById('current-song-author').innerText = currentSong.author;
            if (player) { player.dispose(); pitchShiftNode.dispose(); }
            pitchShiftNode = new Tone.PitchShift(0).toDestination();
            player = new Tone.Player(currentSong.audioUrl).connect(pitchShiftNode);
            updateSongDisplay();
        }

        function updateSongDisplay() {
            document.getElementById('audio-pitch-status').innerText = `Тональность аудио: ${currentAudioShift > 0 ? '+' : ''}${currentAudioShift} полутон(ов)`;
            if(currentAudioShift === 0) document.getElementById('audio-pitch-status').innerText = "Тональность аудио: Оригинал";
            const formattedLyrics = formatLyrics(currentSong.lyrics, currentChordShift);
            document.getElementById('song-lyrics-box').innerHTML = formattedLyrics;
            const btnSet = document.getElementById('btn-set-status');
            if(worshipSetIds.includes(currentSong.id)) { btnSet.innerText = "✓ В сет-листе"; btnSet.style.background = "var(--accent)"; }
            else { btnSet.innerText = "Добавить в сет"; btnSet.style.background = "#3a3a3c"; }
        }

        function formatLyrics(text, shift) {
            return text.replace(/\[(.*?)\]/g, (match, chord) => {
                let transposed = chord.replace(/[A-G]#?/g, m => {
                    let index = scale.indexOf(m);
                    if (index === -1) return m;
                    return scale[(index + shift + 12) % 12];
                });
                return `<span class="chord">${transposed}</span>`;
            });
        }

        function changeChordsPitch(amount) { currentChordShift += amount; updateSongDisplay(); }
        function changeAudioPitch(amount) { currentAudioShift += amount; if(pitchShiftNode) { pitchShiftNode.pitch = currentAudioShift; } updateSongDisplay(); }

        async function toggleAudio() {
            if (!player) return;
            await Tone.start();
            if (isPlaying) { stopAudio(); } 
            else { player.start(); document.getElementById('btn-play').innerText = "Pause"; document.getElementById('btn-play').style.background = "#ef4444"; isPlaying = true; }
        }

        function stopAudio() { if (player) player.stop(); document.getElementById('btn-play').innerText = "Play"; document.getElementById('btn-play').style.background = "var(--primary)"; isPlaying = false; }
        function toggleWorshipStatus() { if(worshipSetIds.includes(currentSong.id)) { worshipSetIds = worshipSetIds.filter(id => id !== currentSong.id); } else { worshipSetIds.push(currentSong.id); } updateSongDisplay(); }

        function shareWorshipList() {
            const setSongs = songsDatabase.filter(s => worshipSetIds.includes(s.id));
            if(setSongs.length === 0) return alert('Список пуст!');
            let text = "📋 ВОСКРЕСНЫЙ СЕТ-ЛИСТ:\n\n";
            setSongs.forEach((s, index) => { text += `${index + 1}. ${s.title} (${s.author})\n`; });
            if (navigator.share) { navigator.share({ title: 'Worship Set', text: text }); } 
            else { navigator.clipboard.writeText(text); alert('Список скопирован!'); }
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            if(tabName === 'songs') {
                document.getElementById('tab-songs').classList.add('active'); document.getElementById('nav-songs').classList.add('active');
                document.getElementById('page-title').innerText = "База песен"; renderSongsList();
            } else if(tabName === 'worship') {
                document.getElementById('tab-worship').classList.add('active'); document.getElementById('nav-worship').classList.add('active');
                document.getElementById('page-title').innerText = "Воскресный сет"; renderWorshipList();
            } else if(tabName === 'single-song') { document.getElementById('tab-single-song').classList.add('active'); }
        }
        renderSongsList();
    </script>
</body>
</html>
